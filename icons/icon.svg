<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b21"/>
      <stop offset="100%" style="stop-color:#1a1535"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="230" r="160" fill="url(#glow)"/>
  <!-- Plate emoji text -->
  <text x="256" y="290" text-anchor="middle" font-size="200" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">🍽️</text>
  <!-- App name -->
  <text x="256" y="410" text-anchor="middle" font-size="48" font-weight="700"
    font-family="'Ma Shan Zheng',Georgia,serif" fill="#ff6b6b" opacity="0.9">LoveMenu</text>
</svg>
